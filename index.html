<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>RECIPE LOG</title>
  <style>
    :root {
      --bg: #ffffff; 
      --surface-1: #ffffff;
      --surface-2: #f2f2f7; 
      --surface-3: #e5e5ea;
      --text-main: #1c1c1e;
      --text-sub: #8e8e93;
      --accent: #fca311; 
      --danger: #ff3b30;
      --success: #34c759;
      --line: rgba(0, 0, 0, 0.08);
      --shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
      --font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Kaku Gothic ProN", "メイリオ", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text-main);
      font-family: var(--font-family);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      padding: calc(16px + env(safe-area-inset-top)) 12px 100px;
    }

    .container {
      max-width: 430px;
      margin: 0 auto;
    }

    /* Header */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 16px 0 16px;
      gap: 12px;
    }

    .section-title {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0.03em;
      color: var(--text-main);
    }

    .sub-btn {
      background: var(--surface-2);
      border: none;
      color: var(--text-main);
      font-weight: 700;
      border-radius: 10px;
      padding: 0 12px;
      height: 34px;
      font-size: 12px;
      cursor: pointer;
    }

    /* Search & Add */
    .combo-area {
      position: sticky;
      top: calc(8px + env(safe-area-inset-top));
      z-index: 100;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 8px 0 12px;
    }

    .input-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .combo-input {
      flex: 1;
      min-width: 0;
      background: var(--surface-2);
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      color: var(--text-main);
      transition: all 0.2s;
    }

    .combo-input:focus {
      background: var(--surface-1);
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(252, 163, 17, 0.1);
    }

    .add-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      font-weight: 800;
      border-radius: 12px;
      padding: 0 16px;
      height: 44px;
      cursor: pointer;
      display: none;
      box-shadow: var(--shadow);
      font-size: 14px;
    }

    /* Grid List (3列表示) */
    .recipe-list {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* 3列に固定 */
      gap: 8px; /* 列を増やしたので隙間を少し狭く */
    }

    .recipe-item-wrapper {
      position: relative;
      background-color: var(--danger);
      border-radius: 14px;
      overflow: hidden;
    }

    .delete-action {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
    }

    .recipe-card {
      position: relative;
      z-index: 2;
      background: var(--surface-1);
      transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .recipe-thumb {
      width: 100%;
      aspect-ratio: 1 / 1; /* 3列は正方形に近い方が綺麗 */
      object-fit: cover;
      background: var(--surface-2);
      border-bottom: 1px solid var(--line);
    }

    .recipe-thumb-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: #fafafa;
    }

    .recipe-text-wrap {
      padding: 8px;
      flex: 1;
    }

    .tag-badge {
      display: inline-block;
      font-size: 8px; /* 3列用に最小化 */
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--surface-2);
      color: var(--text-sub);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      max-width: 100%;
      text-overflow: ellipsis;
    }

    .recipe-name {
      font-size: 13px; /* 3列用に小さく */
      font-weight: 700;
      line-height: 1.3;
      cursor: pointer;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Detail Page */
    #detailPage { display: none; }

    .back-btn {
      background: var(--surface-2);
      border: none;
      padding: 8px 14px;
      border-radius: 10px;
      font-weight: 700;
      color: var(--text-main);
      font-size: 14px;
    }

    .detail-section { margin-bottom: 20px; }

    .detail-label {
      font-size: 11px;
      font-weight: 800;
      color: var(--text-sub);
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .category-select {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid transparent;
      padding: 12px;
      border-radius: 10px;
      font-weight: 700;
      outline: none;
    }

    .image-panel {
      background: var(--surface-1);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .image-preview-wrap {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: #f9f9fb;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .image-preview { width: 100%; height: 100%; object-fit: cover; display: none; }

    .image-actions { display: flex; gap: 8px; }

    .image-upload-label, .image-remove-btn {
      flex: 1;
      height: 40px;
      border-radius: 10px;
      font-weight: 800;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
    }

    .image-upload-label { background: var(--accent); color: #fff; }
    .image-remove-btn { background: var(--surface-2); color: var(--text-main); }

    .editor-textarea {
      width: 100%;
      min-height: 250px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      font-size: 15px;
      line-height: 1.6;
      outline: none;
      box-shadow: var(--shadow);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
    }
    .toast.show { opacity: 1; }

    .debug-panel { margin-top: 30px; border-top: 1px solid var(--line); padding-top: 16px; }
    .debug-log { background: #f2f2f7; padding: 10px; border-radius: 10px; font-family: monospace; font-size: 10px; overflow: auto; max-height: 120px; }

    .loading { text-align: center; padding: 40px; color: var(--text-sub); }
  </style>
</head>
<body>
  <div class="container">
    <div id="mainPage">
      <div class="header-row">
        <div class="section-title">RECIPE LOG</div>
        <button class="sub-btn" onclick="runDebugCheck()">接続確認</button>
      </div>
      <div class="combo-area">
        <div class="input-group">
          <input type="text" id="comboInput" class="combo-input" placeholder="検索・追加..." autocomplete="off" />
          <button id="addBtn" class="add-btn" onclick="addRecipe()">追加</button>
        </div>
      </div>
      <div id="recipeList" class="recipe-list"></div>
    </div>

    <div id="detailPage">
      <div class="header-row">
        <button class="back-btn" onclick="backToList()">← 戻る</button>
        <button id="saveBtn" class="add-btn" style="display:block; height:36px;" onclick="saveRecipe()">保存</button>
      </div>
      <div id="detailTitle" class="section-title" style="margin-bottom:16px;"></div>
      <div class="detail-section">
        <div class="detail-label">カテゴリ</div>
        <select id="categoryEditor" class="category-select">
          <option value="未設定">カテゴリを選択</option>
          <option value="肉料理">肉料理</option>
          <option value="魚料理">魚料理</option>
          <option value="野菜・サラダ">野菜・サラダ</option>
          <option value="麺・ごはん">麺・ごはん</option>
          <option value="デザート">デザート</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="detail-section">
        <div class="detail-label">写真</div>
        <div class="image-panel">
          <div class="image-preview-wrap">
            <img id="recipeImagePreview" class="image-preview" />
            <div id="imageEmptyState">📷</div>
          </div>
          <div class="image-actions">
            <label class="image-upload-label">画像を選択<input id="imageInput" type="file" accept="image/*" style="display:none;" /></label>
            <button class="image-remove-btn" onclick="removeImage()">削除</button>
          </div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-label">作り方メモ</div>
        <textarea id="recipeEditor" class="editor-textarea" placeholder="レシピを入力..."></textarea>
      </div>
      <details class="debug-panel">
        <summary style="font-size: 11px; color: #888;">Debug Log</summary>
        <pre id="debugLog" class="debug-log"></pre>
      </details>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzPnvUIDsjS5npFzx5xU3lLCLd0dGrhB72JLfT3F_4CZ3dHgBaiGKMuAZlbmlf0ZG4Vew/exec";
    let recipes = [];
    let currentEditingIndex = -1;
    let startX = 0;
    let currentItem = null;

    async function apiRequest(payload) {
      const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
      return await res.text();
    }

    async function fetchRecipes() {
      const list = document.getElementById("recipeList");
      list.innerHTML = '<div class="loading">...</div>';
      try {
        const res = await fetch(GAS_URL, { cache: "no-store" });
        recipes = await res.json();
        render();
      } catch (e) { showToast("読み込み失敗"); }
    }

    function render() {
      const list = document.getElementById("recipeList");
      const query = document.getElementById("comboInput").value.toLowerCase();
      const filtered = recipes.map((r, i) => ({r, i})).filter(x => x.r[0].toLowerCase().includes(query));

      list.innerHTML = filtered.map(x => `
        <div class="recipe-item-wrapper">
          <div class="delete-action" onclick="deleteRecipe(${x.i})">削除</div>
          <div class="recipe-card" ontouchstart="ts(event)" ontouchmove="tm(event)" ontouchend="te(event)">
            ${x.r[3] ? `<img class="recipe-thumb" src="${x.r[3]}">` : `<div class="recipe-thumb recipe-thumb-placeholder">📷</div>`}
            <div class="recipe-text-wrap">
              <span class="tag-badge">${x.r[2] || '未設定'}</span>
              <div class="recipe-name" onclick="showDetail(${x.i})">${x.r[0]}</div>
            </div>
          </div>
        </div>
      `).join("");
    }

    function ts(e) { startX = e.touches[0].clientX; currentItem = e.currentTarget; currentItem.style.transition = "none"; }
    function tm(e) { 
      let mx = e.touches[0].clientX - startX; 
      if (mx < 0 && mx > -60) currentItem.style.transform = `translateX(${mx}px)`; 
    }
    function te(e) {
      currentItem.style.transition = "transform 0.3s ease";
      let mx = e.changedTouches[0].clientX - startX;
      currentItem.style.transform = mx < -30 ? "translateX(-50px)" : "translateX(0)";
    }

    function showDetail(i) {
      currentEditingIndex = i;
      const r = recipes[i];
      document.getElementById("mainPage").style.display = "none";
      document.getElementById("detailPage").style.display = "block";
      document.getElementById("detailTitle").innerText = r[0];
      document.getElementById("recipeEditor").value = r[1] || "";
      document.getElementById("categoryEditor").value = r[2] || "未設定";
      const img = document.getElementById("recipeImagePreview");
      const placeholder = document.getElementById("imageEmptyState");
      if(r[3]) { img.src = r[3]; img.style.display = "block"; placeholder.style.display = "none"; }
      else { img.style.display = "none"; placeholder.style.display = "block"; }
    }

    function backToList() {
      document.getElementById("mainPage").style.display = "block";
      document.getElementById("detailPage").style.display = "none";
      fetchRecipes();
    }

    async function saveRecipe() {
      const btn = document.getElementById("saveBtn"); btn.disabled = true;
      try {
        await apiRequest({
          method: "update",
          name: recipes[currentEditingIndex][0],
          recipe: document.getElementById("recipeEditor").value,
          category: document.getElementById("categoryEditor").value
        });
        showToast("保存完了");
      } catch (e) { showToast("保存失敗"); }
      btn.disabled = false;
    }

    async function addRecipe() {
      const name = document.getElementById("comboInput").value;
      if (!name) return;
      try {
        await apiRequest({ method: "add", name: name, recipe: "", category: "未設定" });
        document.getElementById("comboInput").value = "";
        fetchRecipes();
        showToast("追加しました");
      } catch (e) { showToast("追加失敗"); }
    }

    async function deleteRecipe(i) {
      if (!confirm("削除しますか？")) return;
      try {
        await apiRequest({ method: "delete", name: recipes[i][0] });
        fetchRecipes();
        showToast("削除しました");
      } catch (e) { showToast("削除失敗"); }
    }

    async function handleImage(e) {
      const file = e.target.files[0]; if (!file) return;
      showToast("アップロード中...");
      const reader = new FileReader();
      reader.onload = async (ev) => {
        try {
          const base64 = ev.target.result.split(",")[1];
          await apiRequest({
            method: "uploadImage",
            name: recipes[currentEditingIndex][0],
            base64Data: base64,
            fileName: file.name,
            mimeType: file.type
          });
          showToast("画像保存完了");
          showDetail(currentEditingIndex);
        } catch (e) { showToast("失敗"); }
      };
      reader.readAsDataURL(file);
    }

    function showToast(m) {
      const t = document.getElementById("toast");
      t.innerText = m; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2000);
    }

    document.getElementById("comboInput").addEventListener("input", () => {
      document.getElementById("addBtn").style.display = document.getElementById("comboInput").value ? "block" : "none";
      render();
    });
    document.getElementById("imageInput").addEventListener("change", handleImage);
    fetchRecipes();
  </script>
</body>
</html>
