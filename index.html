<!DOCTYPE html>
<html lang="ja">
<head>
    <style>
        /* 基本のデザインはMONEY LOGから継承 */
        /* レシピ特有の色（オレンジやグリーン）をアクセントにしても◎ */
        :root {
            --accent: #ff9500; /* レシピっぽくオレンジ */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-row">
            <div class="section-title">RECIPE LOG</div>
            <input id="newRecipeTitle" class="inline-input" style="max-width:200px" placeholder="新しい料理名">
            <button class="update-btn" style="height:30px" onclick="addRecipe()">追加</button>
        </div>
        
        <div id="recipeList" class="list-container">
            </div>
    </div>

<script>
    // 10品の初期データ
    let recipes = ["生姜焼き", "カルボナーラ", "本鮪のあら煮", "マカロン", "唐揚げ", "チーズケーキ", "ハヤシライス", "エビマヨ", "汁なし担々麺", "味噌つけ麺"];

    function render() {
        const list = document.getElementById("stockList"); // MONEY LOGのID流用
        list.innerHTML = recipes.map((name, index) => `
            <section class="stock-card" style="--brand:var(--accent)">
                <div class="card-top">
                    <div class="card-label">${name}</div>
                    <div class="account-badge" onclick="deleteRecipe(${index})">削除</div>
                </div>
            </section>
        `).join("");
    }

    function addRecipe() {
        const input = document.getElementById("newRecipeTitle");
        if(input.value) {
            recipes.unshift(input.value); // 先頭に追加
            input.value = "";
            render();
        }
    }

    function deleteRecipe(index) {
        recipes.splice(index, 1);
        render();
    }

    render();
</script>
</body>
</html>
