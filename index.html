<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>RECIPE LOG</title>
  <style>
    :root {
      --bg: #ffffff; 
      --surface-1: #ffffff;
      --surface-2: #f8f8f9; 
      --text-main: #1c1c1e;
      --text-sub: #8e8e93;
      --accent: #fca311; /* オレンジ */
      --line: rgba(0, 0, 0, 0.05);
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: calc(16px + env(safe-area-inset-top)) 12px 100px;
    }

    .container { max-width: 430px; margin: 0 auto; }

    /* Logo & Header */
    .header-row {
      display: flex;
      align-items: center;
      margin: 16px 0 24px;
      gap: 12px;
    }

    /* 画像のリングをイメージしたロゴ */
    .app-logo {
      width: 32px;
      height: 32px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .app-logo::after {
      content: "";
      width: 20px;
      height: 20px;
      border: 1px solid var(--accent);
      border-radius: 50%;
    }

    .section-title {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.05em;
    }

    /* Search Input */
    .combo-area {
      position: sticky;
      top: calc(8px + env(safe-area-inset-top));
      z-index: 100;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 8px 0 16px;
    }

    .input-group { display: flex; gap: 8px; align-items: center; }

    .combo-input {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      outline: none;
    }

    .add-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      font-weight: 800;
      border-radius: 12px;
      padding: 0 16px;
      height: 44px;
      display: none;
    }

    /* 3-Column Grid */
    .recipe-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .recipe-item-wrapper {
      position: relative;
      background: #ff3b30;
      border-radius: 12px;
      overflow: hidden;
    }

    .recipe-card {
      position: relative;
      z-index: 2;
      background: var(--surface-1);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .recipe-thumb {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      background: var(--surface-2);
    }

    .recipe-text-wrap { padding: 8px; }

    .recipe-name {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Loading Fix */
    .loading {
      grid-column: 1 / -1; /* 横いっぱいに広げる */
      text-align: center;
      padding: 40px;
      color: var(--text-sub);
      font-size: 14px;
      letter-spacing: 0.1em;
    }

    /* Detail Page */
    #detailPage { display: none; }
    .back-btn {
      background: var(--surface-2);
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 700;
    }

    .image-panel {
      background: var(--surface-2);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }

    .image-preview-wrap {
      width: 100%;
      aspect-ratio: 16/10;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-upload-label {
      background: var(--accent);
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: 800;
      display: inline-block;
      cursor: pointer;
    }

    .editor-textarea {
      width: 100%;
      min-height: 300px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      line-height: 1.6;
      outline: none;
    }

    .toast {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: 0.3s;
      z-index: 1000;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <div id="mainPage">
      <div class="header-row">
        <div class="app-logo"></div>
        <div class="section-title">RECIPE LOG</div>
      </div>
      <div class="combo-area">
        <div class="input-group">
          <input type="text" id="comboInput" class="combo-input" placeholder="検索・新しい料理名..." autocomplete="off" />
          <button id="addBtn" class="add-btn" onclick="addRecipe()">追加</button>
        </div>
      </div>
      <div id="recipeList" class="recipe-list"></div>
    </div>

    <div id="detailPage">
      <div class="header-row">
        <button class="back-btn" onclick="backToList()">← 戻る</button>
        <button id="saveBtn" class="add-btn" style="display:block; height:36px; margin-left:auto;" onclick="saveRecipe()">保存</button>
      </div>
      <div id="detailTitle" class="section-title" style="margin-bottom:16px;"></div>
      <div class="detail-section"><select id="categoryEditor" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--line);"><option value="未設定">カテゴリを選択</option><option value="肉料理">肉料理</option><option value="魚料理">魚料理</option><option value="野菜・サラダ">野菜・サラダ</option><option value="麺・ごはん">麺・ごはん</option><option value="デザート">デザート</option><option value="その他">その他</option></select></div>
      <div class="detail-section">
        <div class="image-panel">
          <div class="image-preview-wrap">
            <img id="recipeImagePreview" style="width:100%; height:100%; object-fit:cover; display:none;" />
            <div id="imageEmptyState" style="font-size:30px;">📷</div>
          </div>
          <label class="image-upload-label">写真を選択<input id="imageInput" type="file" accept="image/*" style="display:none;" /></label>
        </div>
      </div>
      <textarea id="recipeEditor" class="editor-textarea" placeholder="レシピを入力..."></textarea>
    </div>
  </div>
  <div id="toast" class="toast"></div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzPnvUIDsjS5npFzx5xU3lLCLd0dGrhB72JLfT3F_4CZ3dHgBaiGKMuAZlbmlf0ZG4Vew/exec";
    let recipes = [];
    let currentEditingIndex = -1;
    let startX = 0;
    let currentItem = null;

    async function apiRequest(payload) {
      const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
      return await res.text();
    }

    async function fetchRecipes() {
      const list = document.getElementById("recipeList");
      list.innerHTML = '<div class="loading">RECIPES LOADING...</div>';
      try {
        const res = await fetch(GAS_URL, { cache: "no-store" });
        recipes = await res.json();
        render();
      } catch (e) { showToast("読み込み失敗"); }
    }

    function render() {
      const list = document.getElementById("recipeList");
      const query = document.getElementById("comboInput").value.toLowerCase();
      const filtered = recipes.map((r, i) => ({r, i})).filter(x => x.r[0].toLowerCase().includes(query));

      list.innerHTML = filtered.map(x => `
        <div class="recipe-item-wrapper">
          <div style="position:absolute; right:10px; top:50%; transform:translateY(-50%); color:#fff; font-size:10px; font-weight:800;" onclick="deleteRecipe(${x.i})">削除</div>
          <div class="recipe-card" ontouchstart="ts(event)" ontouchmove="tm(event)" ontouchend="te(event)">
            ${x.r[3] ? `<img class="recipe-thumb" src="${x.r[3]}">` : `<div class="recipe-thumb" style="display:flex;align-items:center;justify-content:center;background:#fafafa;font-size:20px;">📷</div>`}
            <div class="recipe-text-wrap">
              <div class="recipe-name" onclick="showDetail(${x.i})">${x.r[0]}</div>
            </div>
          </div>
        </div>
      `).join("");
    }

    function ts(e) { startX = e.touches[0].clientX; currentItem = e.currentTarget; currentItem.style.transition = "none"; }
    function tm(e) { 
      let mx = e.touches[0].clientX - startX; 
      if (mx < 0 && mx > -60) currentItem.style.transform = `translateX(${mx}px)`; 
    }
    function te(e) {
      currentItem.style.transition = "transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)";
      let mx = e.changedTouches[0].clientX - startX;
      currentItem.style.transform = mx < -30 ? "translateX(-50px)" : "translateX(0)";
    }

    function showDetail(i) {
      currentEditingIndex = i;
      const r = recipes[i];
      document.getElementById("mainPage").style.display = "none";
      document.getElementById("detailPage").style.display = "block";
      document.getElementById("detailTitle").innerText = r[0];
      document.getElementById("recipeEditor").value = r[1] || "";
      document.getElementById("categoryEditor").value = r[2] || "未設定";
      const img = document.getElementById("recipeImagePreview");
      const placeholder = document.getElementById("imageEmptyState");
      if(r[3]) { img.src = r[3]; img.style.display = "block"; placeholder.style.display = "none"; }
      else { img.style.display = "none"; placeholder.style.display = "block"; }
      window.scrollTo(0, 0);
    }

    function backToList() {
      document.getElementById("mainPage").style.display = "block";
      document.getElementById("detailPage").style.display = "none";
      fetchRecipes();
    }

    async function saveRecipe() {
      const btn = document.getElementById("saveBtn"); btn.disabled = true;
      try {
        await apiRequest({
          method: "update",
          name: recipes[currentEditingIndex][0],
          recipe: document.getElementById("recipeEditor").value,
          category: document.getElementById("categoryEditor").value
        });
        showToast("保存しました ✓");
      } catch (e) { showToast("失敗"); }
      btn.disabled = false;
    }

    async function addRecipe() {
      const name = document.getElementById("comboInput").value.trim();
      if (!name) return;
      try {
        await apiRequest({ method: "add", name: name, recipe: "", category: "未設定" });
        document.getElementById("comboInput").value = "";
        fetchRecipes();
        showToast("追加しました");
      } catch (e) { showToast("失敗"); }
    }

    async function deleteRecipe(i) {
      if (!confirm("削除しますか？")) return;
      try {
        await apiRequest({ method: "delete", name: recipes[i][0] });
        fetchRecipes();
        showToast("削除しました");
      } catch (e) { showToast("失敗"); }
    }

    async function handleImage(e) {
      const file = e.target.files[0]; if (!file) return;
      showToast("アップロード中...");
      const reader = new FileReader();
      reader.onload = async (ev) => {
        try {
          const base64 = ev.target.result.split(",")[1];
          await apiRequest({ method: "uploadImage", name: recipes[currentEditingIndex][0], base64Data: base64, fileName: file.name, mimeType: file.type });
          showToast("保存完了 ✓");
          showDetail(currentEditingIndex);
        } catch (e) { showToast("失敗"); }
      };
      reader.readAsDataURL(file);
    }

    function showToast(m) {
      const t = document.getElementById("toast");
      t.innerText = m; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2500);
    }

    document.getElementById("comboInput").addEventListener("input", () => {
      document.getElementById("addBtn").style.display = document.getElementById("comboInput").value.trim() ? "block" : "none";
      render();
    });
    document.getElementById("imageInput").addEventListener("change", handleImage);
    fetchRecipes();
  </script>
</body>
</html>
