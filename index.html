<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>RECIPE LOG</title>
  <style>
    :root {
      --bg: #ffffff; /* 純粋な白をベースに */
      --surface-1: #ffffff; /* カードやパネルも白 */
      --surface-2: #f2f2f7; /* 入力フォーム、ボタンの背景（明るいグレー） */
      --surface-3: #e5e5ea; /* デバッグチップなどの背景 */
      --text-main: #1c1c1e; /* メインテキスト（ほぼ黒） */
      --text-sub: #8e8e93; /* サブテキスト（グレー） */
      --accent: #fca311; /* アクセントのオレンジを維持 */
      --danger: #ff3b30; /* ライトモード用の鮮やかな赤 */
      --success: #34c759; /* ライトモード用の鮮やかな緑 */
      --line: rgba(0, 0, 0, 0.06); /* 清潔感のある繊細な線 */
      --shadow: 0 4px 14px rgba(0, 0, 0, 0.06); /* 軽く、繊細な影 */
      --font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Kaku Gothic ProN", "メイリオ", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text-main);
      font-family: var(--font-family);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      /* 背景テクスチャを削除して清潔感を強調 */
    }

    body {
      padding: calc(16px + env(safe-area-inset-top)) 16px 100px;
    }

    .container {
      max-width: 430px;
      margin: 0 auto;
    }

    /* ヘッダー */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 32px 0 24px;
      gap: 12px;
    }

    .section-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0.05em;
      color: var(--accent); /* タイトルはオレンジでOK */
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .sub-btn {
      background: var(--surface-2);
      border: none;
      color: var(--text-main);
      font-weight: 700;
      border-radius: 14px;
      padding: 0 16px;
      height: 44px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .sub-btn:hover { background: var(--surface-3); }

    /* 入力エリア */
    .combo-area {
      position: sticky;
      top: calc(16px + env(safe-area-inset-top));
      z-index: 100;
      /* グラスモーフィズムを維持しつつ明るく */
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 10px 0 16px;
      border-bottom: 1px solid var(--line);
    }

    .input-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .combo-input {
      flex: 1;
      min-width: 0;
      background: var(--surface-1);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      font-size: 17px;
      outline: none;
      color: var(--text-main);
      transition: border-color 0.15s, box-shadow 0.15s;
      /* 内側のグラデーションを削除して清潔に */
    }

    .combo-input:focus {
      border-color: rgba(252,163,17,0.6);
      box-shadow: 0 0 0 5px rgba(252,163,17,0.1); /* 影をより繊細に */
    }

    .add-btn {
      background: var(--accent);
      border: none;
      color: #ffffff; /* 白文字に戻す（清潔感） */
      font-weight: 800;
      border-radius: 16px;
      padding: 0 24px;
      height: 56px;
      cursor: pointer;
      white-space: nowrap;
      display: none;
      box-shadow: var(--shadow);
      transition: transform 0.2s, background 0.2s;
    }
    .add-btn:hover { background: #ffb13a; transform: translateY(-2px); }
    .add-btn:active { transform: translateY(0); }

    .add-btn:disabled,
    .sub-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* レシピリスト (グリッド) */
    .recipe-list {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 16px;
    }

    .recipe-item-wrapper {
      position: relative;
      background-color: var(--danger);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .delete-action {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
      background: rgba(255, 59, 48, 0.9); /* ライトモード用の赤 */
      flex-direction: column;
      gap: 4px;
    }
    .delete-action::before {
      content: "🗑";
      font-size: 20px;
    }

    .recipe-card {
      position: relative;
      z-index: 2;
      background: var(--surface-1);
      transition: transform 0.2s ease-out;
      box-shadow: var(--shadow);
      touch-action: pan-y;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
    }

    .recipe-card-inner {
      display: flex;
      flex-direction: column;
    }

    .recipe-thumb {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      background: #f6f6f8; /* 明るいプレースホルダー */
      border-bottom: 1px solid var(--line);
    }

    .recipe-thumb-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: var(--text-sub);
    }

    .recipe-text-wrap {
      padding: 12px 16px;
      flex: 1;
    }

    .tag-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--surface-2); /* 明るいグレー */
      color: var(--text-main);
      margin-bottom: 10px;
      width: fit-content;
      letter-spacing: 0.02em;
    }

    .recipe-name {
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      word-break: break-word;
      line-height: 1.3;
      color: var(--text-main);
    }

    .recipe-sub {
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-sub);
    }

    /* 詳細ページ */
    #detailPage {
      display: none;
    }

    .back-btn {
      background: var(--surface-2);
      border: none;
      padding: 10px 18px;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      color: var(--text-main);
      transition: background 0.2s;
    }
    .back-btn:hover { background: var(--surface-3); }

    .detail-section {
      margin-bottom: 20px;
    }

    .detail-label {
      font-size: 13px;
      font-weight: 800;
      color: var(--text-sub);
      margin-bottom: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .category-select {
      width: 100%;
      background: var(--surface-2);
      border: none;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 16px;
      font-weight: 700;
      color: var(--text-main);
      outline: none;
      transition: background 0.2s;
    }
    .category-select:hover { background: var(--surface-3); }

    .image-panel,
    .debug-panel {
      background: var(--surface-1);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .image-preview-wrap {
      width: 100%;
      aspect-ratio: 16 / 11;
      background: #f6f6f8; /* 明るい背景 */
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      position: relative;
    }

    .image-preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .image-empty {
      color: var(--text-sub);
      font-weight: 700;
      font-size: 15px;
      padding: 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .image-empty::before {
      content: "📷";
      font-size: 32px;
    }

    .image-actions,
    .debug-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .image-upload-label,
    .image-remove-btn,
    .debug-btn {
      flex: 1;
      border: none;
      border-radius: 14px;
      height: 48px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: transform 0.2s, background 0.2s;
    }

    .image-upload-label {
      background: var(--accent);
      color: #ffffff; /* 白文字（清潔感） */
      box-shadow: var(--shadow);
    }
    .image-upload-label:hover { background: #ffb13a; transform: translateY(-2px); }

    .image-remove-btn {
      background: var(--surface-2);
      color: var(--text-main);
    }
    .image-remove-btn:hover { background: var(--surface-3); }

    .debug-btn {
      background: var(--surface-2); /* 明るい背景 */
      color: var(--text-main);
    }
    .debug-btn:hover { background: var(--surface-3); }

    .image-upload-label input {
      display: none;
    }

    .image-note,
    .debug-note {
      margin-top: 12px;
      font-size: 12px;
      color: var(--text-sub);
      line-height: 1.7;
    }

    .editor-textarea {
      width: 100%;
      min-height: 38vh;
      background: var(--surface-1);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      font-size: 17px;
      line-height: 1.8;
      resize: vertical;
      outline: none;
      color: var(--text-main);
      box-shadow: var(--shadow);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .editor-textarea:focus {
      border-color: rgba(252,163,17,0.6);
      box-shadow: 0 0 0 5px rgba(252,163,17,0.1); /* 影をより繊細に */
    }

    .debug-summary {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }

    .debug-summary::-webkit-details-marker {
      display: none;
    }

    .debug-summary::after {
      content: "▼";
      font-size: 11px;
      color: var(--text-sub);
    }

    .debug-panel[open] .debug-summary::after {
      content: "▲";
    }

    .debug-status-line {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 16px 0 12px;
