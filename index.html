<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>RECIPE LOG</title>
<style>
:root { --bg: #f2f2f7; --surface: #ffffff; --accent: #ff9500; --danger: #ff3b30; --text: #1c1c1e; }
* { box-sizing: border-box; font-family: -apple-system, sans-serif; }
body { margin: 0; background: var(--bg); color: var(--text); padding: env(safe-area-inset-top) 12px 100px; }
.container { max-width: 430px; margin: 0 auto; }
.header { font-size: 22px; font-weight: 800; margin: 24px 0; }
.input-row { position: sticky; top: 10px; z-index: 10; display: flex; gap: 8px; background: var(--bg); padding-bottom: 16px; }
input { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); font-size: 16px; outline: none; }
button { border: none; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; padding: 0 16px; }
.recipe-item { position: relative; background: var(--danger); border-radius: 16px; overflow: hidden; margin-bottom: 10px; }
.recipe-card { position: relative; z-index: 2; background: var(--surface); padding: 16px; transition: transform 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
.del-label { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: white; font-weight: 800; font-size: 14px; }
#detailPage { display: none; }
textarea { width: 100%; height: 60vh; border-radius: 16px; border: 1px solid rgba(0,0,0,0.1); padding: 16px; font-size: 16px; resize: none; outline: none; }
</style>
</head>
<body>
<div class="container" id="mainPage">
  <div class="header">RECIPE LOG</div>
  <div class="input-row">
    <input type="text" id="combo" placeholder="検索または新しい料理" oninput="draw()">
    <button style="background:var(--accent);" onclick="goAdd()">追加</button>
  </div>
  <div id="list"></div>
</div>
<div class="container" id="detailPage">
  <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
    <button style="background:#8e8e93;" onclick="goBack()">戻る</button>
    <div id="dTitle"></div>
    <button style="background:var(--accent);" onclick="save()">保存</button>
  </div>
  <textarea id="dEdit"></textarea>
</div>
<script>
const URL = "あなたのGASのURL";
let items = []; let startX = 0; let curCard = null;

async function load() {
  const res = await fetch(URL);
  items = await res.json();
  draw();
}

function draw() {
  const q = document.getElementById("combo").value.toLowerCase();
  const f = items.filter(i => i[0].toLowerCase().includes(q));
  document.getElementById("list").innerHTML = f.map((item, i) => {
    const idx = items.findIndex(it => it[0] === item[0]);
    return `
    <div class="recipe-item">
      <div class="del-label" onclick="del(${idx})">削除</div>
      <div class="recipe-card" ontouchstart="ts(event)" ontouchmove="tm(event)" ontouchend="te(event)" onclick="show(${idx})">
        <div style="font-weight:700;">${item[0]}</div>
      </div>
    </div>`}).join("");
}

function goAdd() {
  const v = document.getElementById("combo").value.trim(); if(!v) return;
  items.unshift([v, "", "未設定"]); draw();
  fetch(URL, { method: "POST", body: JSON.stringify({ method: "add", name: v }), mode: 'no-cors' });
}

function show(idx) {
  const it = items[idx];
  document.getElementById("mainPage").style.display = "none";
  document.getElementById("detailPage").style.display = "block";
  document.getElementById("dTitle").innerText = it[0];
  document.getElementById("dEdit").value = it[1];
}

async function save() {
  const t = document.getElementById("dTitle").innerText;
  const c = document.getElementById("dEdit").value;
  fetch(URL, { method: "POST", body: JSON.stringify({ method: "update", name: t, recipe: c, category: "未設定" }), mode: 'no-cors' });
  const it = items.find(i => i[0] === t); if(it) it[1] = c;
  goBack();
}

async function del(idx) {
  if(!confirm("削除しますか？")) return;
  const n = items[idx][0]; items.splice(idx, 1); draw();
  fetch(URL, { method: "POST", body: JSON.stringify({ method: "delete", name: n }), mode: 'no-cors' });
}

function goBack() { document.getElementById("mainPage").style.display = "block"; document.getElementById("detailPage").style.display = "none"; draw(); }
function ts(e) { startX = e.touches[0].clientX; curCard = e.currentTarget; curCard.style.transition = "none"; }
function tm(e) { let x = e.touches[0].clientX - startX; if(x < 0 && x > -100) curCard.style.transform = `translateX(${x}px)`; }
function te(e) { curCard.style.transition = "transform 0.2s"; let x = e.changedTouches[0].clientX - startX; curCard.style.transform = x < -50 ? "translateX(-80px)" : "translateX(0)"; }
load();
</script>
</body>
</html>
